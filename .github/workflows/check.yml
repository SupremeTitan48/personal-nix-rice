name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Evaluate NixOS configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Use Cachix so subsequent runs hit the binary cache instead of rebuilding.
      - name: Set up Cachix
        uses: cachix/cachix-action@v14
        with:
          name: hyprland
          # Add your own Cachix cache here if you have one:
          # authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Evaluate and build the NixOS closure. Hyprland's flake uses
      # Import-From-Derivation (reads VERSION during eval), so --no-build
      # and --dry-run both fail. Using --no-link instead: Cachix substitutes
      # the pre-built Hyprland binaries so no compilation happens in CI.
      - name: Build NixOS configuration (substituted from Cachix)
        run: |
          set -o pipefail
          nix build \
            .#nixosConfigurations.desktop.config.system.build.toplevel \
            --no-link \
            --show-trace \
            2>&1 | tail -20
